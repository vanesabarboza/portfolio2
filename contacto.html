<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<body>

<header class="header">

  <nav class="nav">

  </nav>

<main class="container">

  <h1 class="title">Contacto</h1>

  <div class="contact-wrapper">

    <div class="contact-img">
      <img src="img/portfolio/Portfolio1_2.png" alt="">
    </div>

    <form class="contact-form">

      <label>Nombre y apellido:</label>
      <input type="text" placeholder="Ingresa tu nombre...">

      <label>E-mail</label>
      <input type="email" placeholder="Ingresa tu Email...">

      <label>Contactame</label>
      <textarea placeholder="Ingresa tu consulta..."></textarea>

      <button type="submit" class="btn">ENVIAR</button>

    </form>

  </div>

</main>

<footer class="footer">
  <div class="footer-left">
    <img src="img/Footer.png" alt="avatar">
  </div>

  <div class="footer-center">
    <h3>SERVICIOS</h3>
    <ul>

      <li>
        <a href="#">Diseño 3D</a>
      </li>

      <a href="#">Fotografía</a>

      <li></li>
      <a href="#">Ilustración</a>

      <li></li>
      <a href="#">Diseño WEB</a>

    </ul>
  </div>

  <div class="footer-right">
    <h3>Sígueme en ...</h3>
    
    <div class="socials">
      <a href="https://instagram.com/" target="_blank">
        <img src="img/icons/ig.png" alt="Instagram">
      </a>

      <a href="https://linkedin.com/" target="_blank">
        <img src="img/icons/linkedin.png" alt="LinkedIn">
      </a>
    </div>

  </div>
</footer>
